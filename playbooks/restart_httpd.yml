---
- name: Remediation - Restart and Enable Apache
  hosts: all  # The "limit" passed from EDA will restrict this to the specific host
  become: true
  tasks:
    - name: Ensure httpd is running and enabled
      ansible.builtin.systemd:
        name: httpd
        state: started
        enabled: true

    - name: Verify service state
      ansible.builtin.systemd:
        name: httpd
      register: httpd_status

    - name: Report Success
      ansible.builtin.debug:
        msg: "Apache httpd is now {{ httpd_status.status.ActiveState }} on {{ inventory_hostname }}"
